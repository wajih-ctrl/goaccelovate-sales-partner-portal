<!doctype html>
<html lang="en">
  <body style="margin: 0; background: #f4f7fb; font-family: Arial, sans-serif; color: #102033">
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 600px;
              background: #fff;
              border: 1px solid #dbe3ec;
              border-radius: 8px;
              overflow: hidden;
            "
          >
            <tr>
              <td style="background: #0d2138; padding: 24px 32px">
                <img
                  src="{{ .SiteURL }}/Tagline-Version.png"
                  width="190"
                  alt="GoAccelovate"
                  style="display: block; max-width: 100%; height: auto"
                />
              </td>
            </tr>
            <tr>
              <td style="padding: 36px 32px">
                <p
                  style="
                    margin: 0 0 10px;
                    color: #25835b;
                    font-size: 13px;
                    font-weight: 700;
                    text-transform: uppercase;
                  "
                >
                  Security confirmation
                </p>
                <h1 style="margin: 0 0 16px; font-size: 27px">Your email address was changed</h1>
                <p style="margin: 0 0 16px; font-size: 16px; line-height: 1.65; color: #506176">
                  The sign-in email for your GoAccelovate portal account changed from {{ .OldEmail
                  }} to {{ .Email }}.
                </p>
                <p style="margin: 0; font-size: 14px; line-height: 1.65; color: #718096">
                  If you did not make this change, contact your program administrator immediately.
                </p>
              </td>
            </tr>
            <tr>
              <td
                style="
                  background: #f8fafc;
                  padding: 18px 32px;
                  text-align: center;
                  font-size: 12px;
                  color: #718096;
                "
              >
                GoAccelovate Global Partner Program<br /><a
                  href="https://www.goaccelovate.com"
                  style="color: #315f8f"
                  >www.goaccelovate.com</a
                >
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
