<!doctype html>
<html lang="en">
  <body style="margin: 0; background: #f4f7fb; font-family: Arial, sans-serif; color: #102033">
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 600px;
              background: #fff;
              border: 1px solid #dbe3ec;
              border-radius: 8px;
              overflow: hidden;
            "
          >
            <tr>
              <td style="background: #0d2138; padding: 24px 32px">
                <img
                  src="{{ .SiteURL }}/Tagline-Version.png"
                  width="190"
                  alt="GoAccelovate"
                  style="display: block; max-width: 100%; height: auto"
                />
              </td>
            </tr>
            <tr>
              <td style="padding: 36px 32px">
                <p
                  style="
                    margin: 0 0 10px;
                    color: #b17900;
                    font-size: 13px;
                    font-weight: 700;
                    text-transform: uppercase;
                  "
                >
                  Identity verification
                </p>
                <h1 style="margin: 0 0 16px; font-size: 27px">Confirm it is really you</h1>
                <p style="margin: 0 0 22px; font-size: 16px; line-height: 1.65; color: #506176">
                  Enter this verification code in the GoAccelovate portal to continue with the
                  protected account action.
                </p>
                <div
                  style="
                    display: inline-block;
                    padding: 15px 24px;
                    border: 1px solid #dbe3ec;
                    border-radius: 6px;
                    background: #f8fafc;
                    font-family: monospace;
                    font-size: 28px;
                    font-weight: 700;
                    letter-spacing: 5px;
                    color: #102033;
                  "
                >
                  {{ .Token }}
                </div>
                <p
                  style="
                    margin: 28px 0 0;
                    padding-top: 20px;
                    border-top: 1px solid #e5eaf0;
                    font-size: 13px;
                    line-height: 1.6;
                    color: #718096;
                  "
                >
                  Never share this code. GoAccelovate staff will not ask you for it.
                </p>
              </td>
            </tr>
            <tr>
              <td
                style="
                  background: #f8fafc;
                  padding: 18px 32px;
                  text-align: center;
                  font-size: 12px;
                  color: #718096;
                "
              >
                GoAccelovate Global Partner Program<br /><a
                  href="https://www.goaccelovate.com"
                  style="color: #315f8f"
                  >www.goaccelovate.com</a
                >
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
